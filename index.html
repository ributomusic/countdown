<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ributo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Serif JP',serif}

body{
  background:#000;
  color:#eaeaea;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  -webkit-tap-highlight-color: transparent;
  cursor: url("data:image/svg+xml;utf8,\
  <svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'>\
    <g transform='rotate(-45 16 16)'>\
      <rect x='14' y='2' width='4' height='20' fill='white'/>\
      <rect x='10' y='20' width='12' height='4' fill='white'/>\
      <rect x='13' y='24' width='6' height='6' fill='white'/>\
    </g>\
  </svg>") 16 16, auto;
}

/* 🎥 VIDEO BACKGROUND SAFE */
video.bg{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-3;
  opacity:0.35;
  pointer-events:none;
}

/* overlay para que nada se rompa visualmente */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-2;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("https://www.transparenttextures.com/patterns/rice-paper.png");
  opacity:.05;
  z-index:-1;
}

/* 🔥 fuego base responsive */
.fire-base{
  position:fixed;
  bottom:0;
  width:100%;
  height:clamp(120px, 20vh, 220px);
  background:radial-gradient(circle at 50% 100%, rgba(255,120,0,0.35), transparent 70%);
  filter:blur(30px);
  animation:fireBreath 4s ease-in-out infinite;
}

@keyframes fireBreath{
  0%,100%{opacity:0.5; transform:scaleY(1)}
  50%{opacity:0.9; transform:scaleY(1.2)}
}

/* heat */
.heat{
  position:fixed;
  bottom:0;
  width:100%;
  height:clamp(120px, 20vh, 220px);
  pointer-events:none;
  background:linear-gradient(180deg, transparent, rgba(255,120,0,0.1));
  filter:blur(10px);
  animation:heatWave 3s ease-in-out infinite alternate;
}

@keyframes heatWave{
  0%{transform:translateY(0)}
  100%{transform:translateY(-8px)}
}

.smoke{
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,255,255,.02), transparent 70%);
  animation:smokeMove 20s linear infinite;
}

@keyframes smokeMove{
  from{transform:translate(0,0)}
  to{transform:translate(-200px,-200px)}
}

.container{
  position:relative;
  z-index:2;
  text-align:center;
  animation:breath 6s ease-in-out infinite;
  padding:20px;
}

@keyframes breath{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.02)}
}

/* LOGO RESPONSIVE */
.logo{
  width:clamp(120px, 30vw, 200px);
  margin-bottom:clamp(20px, 5vh, 50px);
  opacity:.95;
  transition:filter .2s, transform .2s;
}

.logo.glow{
  filter:drop-shadow(0 0 18px rgba(255,80,0,.6));
  transform:scale(1.02);
}

/* COUNTDOWN RESPONSIVE */
.countdown{
  display:flex;
  gap:clamp(15px, 4vw, 40px);
  justify-content:center;
  font-size:clamp(1.8rem, 6vw, 3rem);
  flex-wrap:wrap;
}

.unit{text-align:center;min-width:60px}

.label{
  font-size:clamp(0.6rem, 2vw, 0.75rem);
  opacity:.3;
}

.tick{animation:tick .25s ease}

@keyframes tick{
  0%{transform:translateY(6px);opacity:.6}
  100%{transform:translateY(0);opacity:1}
}

/* 🔥 partículas fuego */
.fire-particle{
  position:fixed;
  width:clamp(6px, 1vw, 10px);
  height:clamp(6px, 1vw, 10px);
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(255,220,0,1), rgba(255,80,0,0.6), transparent);
  animation:fireFloat 3s ease-out forwards;
}

@keyframes fireFloat{
  0%{transform:translateY(0) scale(1);opacity:1}
  100%{transform:translateY(-200px) scale(.3);opacity:0}
}

/* 🔵 partículas mouse */
.mouse-particle{
  position:fixed;
  width:clamp(5px, 1vw, 8px);
  height:clamp(5px, 1vw, 8px);
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(0,150,255,1), rgba(0,150,255,0.2), transparent);
  box-shadow:0 0 8px rgba(0,150,255,0.6);
  animation:mouseFloat 1s ease-out forwards;
}

@keyframes mouseFloat{
  0%{transform:scale(1);opacity:1}
  100%{transform:scale(0.3) translateY(-20px);opacity:0}
}

/* 📱 ajustes extra mobile */
@media(max-width:600px){
  body{cursor:auto;} /* quita espada en mobile */
  .smoke{opacity:0.5}
}

</style>
</head>
<body>

<!-- 🎥 VIDEO OPCIONAL (NO ROMPE NADA) -->
<!--
<video class="bg" autoplay muted loop playsinline>
  <source src="tu-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
-->

<div class="smoke"></div>
<div class="fire-base"></div>
<div class="heat"></div>

<div class="container">

  <!-- 🔴 CAMBIA TU LOGO AQUÍ -->
  <img src="logo.jpg" class="logo" id="logo">

  <div class="countdown">
    <div class="unit"><span id="d">0</span><div class="label">DAYS</div></div>
    <div class="unit"><span id="h">0</span><div class="label">HOURS</div></div>
    <div class="unit"><span id="m">0</span><div class="label">MIN</div></div>
    <div class="unit"><span id="s">0</span><div class="label">SEC</div></div>
  </div>

</div>

<script>
// ⏳ countdown
const target=new Date(`June 20, ${new Date().getFullYear()} 00:00:00`).getTime();
const els={d:document.getElementById('d'),h:document.getElementById('h'),m:document.getElementById('m'),s:document.getElementById('s')};
let prev={d:null,h:null,m:null,s:null};

setInterval(()=>{
  const diff=target-Date.now();
  const next={
    d:Math.floor(diff/(1000*60*60*24)),
    h:Math.floor((diff/(1000*60*60))%24),
    m:Math.floor((diff/1000/60)%60),
    s:Math.floor((diff/1000)%60)
  };
  for(const k of ['d','h','m','s']){
    if(prev[k]!==next[k]){
      els[k].textContent=next[k];
      els[k].classList.add('tick');
      setTimeout(()=>els[k].classList.remove('tick'),250);
    }
  }
  prev=next;
},1000);

// glow logo
const logo=document.getElementById('logo');
function updateGlow(mx,my){
  const r=logo.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const dist=Math.hypot(mx-cx,my-cy);
  if(dist<200){logo.classList.add('glow')} else{logo.classList.remove('glow')}
}

// 🔥 fuego
function spawnFire(){
  const p=document.createElement('div');
  p.className='fire-particle';
  p.style.left=Math.random()*innerWidth+'px';
  p.style.top=(innerHeight-10)+'px';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),3000);
}
setInterval(spawnFire,90);

// 🔵 partículas mouse (desktop only)
if(window.innerWidth > 768){
  document.addEventListener('mousemove',e=>{
    updateGlow(e.clientX,e.clientY);
    for(let i=0;i<2;i++){
      const p=document.createElement('div');
      p.className='mouse-particle';
      p.style.left=(e.clientX + (Math.random()*20-10))+'px';
      p.style.top=(e.clientY + (Math.random()*20-10))+'px';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),800);
    }
  });
}
</script>

</body>
</html>
